<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<style>
    body {
        background: #222;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 40px;
    }

    #gameContainer {
        display: none;
        margin: auto;
        margin-top: 20px;
    }

    canvas {
        background: #111;
        border: 4px solid #555;
        display: block;
        margin: auto;
    }

    #playBtn, #replayBtn, #homeBtn {
        padding: 12px 25px;
        font-size: 20px;
        cursor: pointer;
        border: none;
        border-radius: 6px;
        background: #28a745;
        color: white;
        margin-top: 20px;
    }

    #replayBtn {
        background: #007bff;
        display: none;
    }

    #score {
        font-size: 22px;
        margin-top: 15px;
    }
</style>
</head>
<body>

<h1>Snake Game</h1>
<a id= "homeBtn" href="index.html">Back to Home</a>
<button id="playBtn">Play</button>
<button id="replayBtn">Replay</button>

<div id="score"></div>

<div id="gameContainer">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const playBtn = document.getElementById("playBtn");
const replayBtn = document.getElementById("replayBtn");
const scoreDisplay = document.getElementById("score");

let snake, food, dx, dy, gameLoop, grownCount;

function startGame() {
    playBtn.style.display = "none";
    replayBtn.style.display = "none";
    scoreDisplay.textContent = "";
    document.getElementById("gameContainer").style.display = "block";

    snake = [{ x: 200, y: 200 }];
    dx = 20;
    dy = 0;
    grownCount = 0;

    placeFood();

    document.addEventListener("keydown", changeDirection);
    gameLoop = setInterval(update, 120);
}

function placeFood() {
    food = {
        x: Math.floor(Math.random() * 20) * 20,
        y: Math.floor(Math.random() * 20) * 20
    };
}

function changeDirection(e) {
    if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -20; }
    else if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = 20; }
    else if (e.key === "ArrowLeft" && dx === 0) { dx = -20; dy = 0; }
    else if (e.key === "ArrowRight" && dx === 0) { dx = 20; dy = 0; }
}

function update() {
    const head = { x: snake[0].x + dx, y: snake[0].y + dy };

    // Wall collision
    if (head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400) {
        return endGame();
    }

    // Self collision
    for (let i = 0; i < snake.length; i++) {
        if (head.x === snake[i].x && head.y === snake[i].y) {
            return endGame();
        }
    }

    snake.unshift(head);

    // Food collision
    if (head.x === food.x && head.y === food.y) {
        grownCount++;
        placeFood();
    } else {
        snake.pop();
    }

    draw();
}

function draw() {
    ctx.fillStyle = "#111";
    ctx.fillRect(0, 0, 400, 400);

    // Draw food
    ctx.fillStyle = "red";
    ctx.fillRect(food.x, food.y, 20, 20);

    // Draw snake
    ctx.fillStyle = "lime";
    snake.forEach(part => {
        ctx.fillRect(part.x, part.y, 20, 20);
    });
}

function endGame() {
    clearInterval(gameLoop);
    scoreDisplay.textContent = "Game Over! Your Score: " + grownCount;
    replayBtn.style.display = "inline-block";
}

playBtn.onclick = startGame;
replayBtn.onclick = startGame;
</script>

</body>
</html>
